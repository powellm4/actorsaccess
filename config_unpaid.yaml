credentials:
  username: ""
  password: ""

# Unpaid mode: LA-only, and paying_only must be false so the AA site filter
# shows unpaid listings. Role-type filtering + unpaid-only enforcement happen
# programmatically in src/main.py via role_matches(..., mode="unpaid") and
# is_lead_or_supporting().
filters:
  regions:
    - region: "Los Angeles"
  gender: "male"
  age_range: [17, 30]
  union_status: "fit_for_me"
  paying_only: false
  exclude_reality_tv: true

submission:
  headshot_index: 0
  include_media: true
  include_size_card: true
  default_note: ""

# Top-level max_pages applies to every region entry that doesn't set its own.
# --max-pages on the CLI overrides this at runtime so the unpaid workflow
# can temporarily dig deeper when dispatched with a max_pages input.
max_pages: 5

browser:
  headless: true

google_calendar:
  service_account_key_env: "GOOGLE_CALENDAR_SA_KEY"
  calendar_ids:
    - "c50f22709de5e666863424cdec435d33cea633a53fe6cd2f34af591825251187@group.calendar.google.com"
    - "4589f6dc4692352bd5b7c8c39c1f90722f093c1846e3c6185f4b0cf317658d5f@group.calendar.google.com"

logging:
  level: "INFO"
  file: "logs/auto_apply_unpaid.log"

# See config.yaml for full Apply Anyway docs. Same repo handles both modes.
overrides:
  repo: "powellm4/aa-overrides"
  label: "apply-anyway"
  # The digest reads apply_url from config.yaml (not this file); see there and
  # worker/README.md for the optional one-click setup.
