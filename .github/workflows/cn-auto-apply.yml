name: CN Auto Apply

on:
  schedule:
    # Every 6 hours: 6:30am, 12:30pm, 6:30pm, 12:30am PT (UTC-7)
    - cron: "30 13,19,1,7 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: db-access
  cancel-in-progress: false

jobs:
  cn-auto-apply:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Download database
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p data
          gh release download db-storage --pattern applied.db --dir data/ --clobber

      - name: Run CN auto-apply (headed via xvfb)
        env:
          CN_EMAIL: ${{ secrets.CN_EMAIL }}
          CN_PASSWORD: ${{ secrets.CN_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: xvfb-run --auto-servernum python -m src.cn.main --once

      - name: Upload database
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload db-storage data/applied.db --clobber
