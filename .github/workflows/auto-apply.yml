name: Auto Apply

on:
  schedule:
    # Every 4 hours: 8am, 12pm, 4pm, 8pm, 12am, 4am PT (UTC-7)
    - cron: "0 15,19,23,3,7,11 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

concurrency:
  group: db-access
  cancel-in-progress: false

jobs:
  auto-apply:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Download database
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p data
          gh release download db-storage --pattern applied.db --dir data/ --clobber

      - name: Run auto-apply
        env:
          AA_USERNAME: ${{ secrets.AA_USERNAME }}
          AA_PASSWORD: ${{ secrets.AA_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m src.main --once

      - name: Upload database
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload db-storage data/applied.db --clobber
