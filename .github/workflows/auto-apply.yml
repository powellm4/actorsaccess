name: Auto Apply

on:
  schedule:
    # Application runs WITHOUT a digest email: 8am, 2pm, 8pm, 11pm PT (UTC-7).
    - cron: "0 15,21,3,6 * * *"
    # Application runs that ALSO send the digest email: 11am & 5pm PT (UTC-7).
    # These two send times are chosen from application history — see the
    # "Send digest email" step below for the rationale.
    - cron: "0 18,0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: db-access
  cancel-in-progress: false

env:
  # DeepSeek shadow comparison paused — kill switch from src/shadow.py.
  # Remove this block to resume background DeepSeek calls.
  SHADOW_ENABLED: "0"
  # Calendar check paused — kill switch from src/calendar_check.py. While set,
  # the bot ignores calendar conflicts and applies for every date. Remove this
  # line (or set to "1") to resume checking the calendar.
  CALENDAR_CHECK_ENABLED: "0"

jobs:
  auto-apply:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Download database
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p data
          gh release download db-storage --pattern applied.db --dir data/ --clobber

      - name: Run AA auto-apply
        env:
          AA_USERNAME: ${{ secrets.AA_USERNAME }}
          AA_PASSWORD: ${{ secrets.AA_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GOOGLE_CALENDAR_SA_KEY: ${{ secrets.GOOGLE_CALENDAR_SA_KEY }}
          OVERRIDE_GITHUB_TOKEN: ${{ secrets.OVERRIDE_GITHUB_TOKEN }}
        run: python -m src.main --once

      - name: Upload database (after AA)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload db-storage data/applied.db --clobber

      - name: Run CN auto-apply (headed via xvfb)
        env:
          CN_EMAIL: ${{ secrets.CN_EMAIL }}
          CN_PASSWORD: ${{ secrets.CN_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GOOGLE_CALENDAR_SA_KEY: ${{ secrets.GOOGLE_CALENDAR_SA_KEY }}
          OVERRIDE_GITHUB_TOKEN: ${{ secrets.OVERRIDE_GITHUB_TOKEN }}
        run: xvfb-run --auto-servernum python -m src.cn.main --once

      - name: Upload database (after CN)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload db-storage data/applied.db --clobber

      - name: Run Backstage auto-apply
        env:
          BACKSTAGE_EMAIL: ${{ secrets.BACKSTAGE_EMAIL }}
          BACKSTAGE_PASSWORD: ${{ secrets.BACKSTAGE_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GOOGLE_CALENDAR_SA_KEY: ${{ secrets.GOOGLE_CALENDAR_SA_KEY }}
          OVERRIDE_GITHUB_TOKEN: ${{ secrets.OVERRIDE_GITHUB_TOKEN }}
        run: python -m src.backstage.main --once

      - name: Upload database (after Backstage)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload db-storage data/applied.db --clobber

      # The pipeline applies on all 6 daily runs, but the digest email only
      # goes out twice a day — at 11am & 5pm PT (the "0 18,0 * * *" schedule),
      # plus any manual run. These two times come from ~3.5 months of history:
      # the 11am email sweeps up everything from overnight + the 8am run, and
      # the 5pm email captures the day's peak (the 2pm & 5pm runs, which produce
      # the bulk of applications and needs-attention flags). Both land while
      # awake, and the 5pm send still leaves the 8pm & 11pm runs to act on
      # anything flagged before the day ends. The digest window self-adjusts:
      # each email covers everything since the previous email actually sent.
      - name: Send digest email (paid)
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 18,0 * * *'
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_SENDER_EMAIL: ${{ secrets.DIGEST_SENDER_EMAIL }}
          ARCHIVE_SITE_URL: ${{ vars.ARCHIVE_SITE_URL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OVERRIDE_SIGNING_SECRET: ${{ secrets.OVERRIDE_SIGNING_SECRET }}
        run: python -m src.digest --mode paid

      # Only needed when the digest ran — it stamps digest_history. On non-digest
      # runs the DB was already uploaded after the Backstage step.
      - name: Upload database (after digest)
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 18,0 * * *'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload db-storage data/applied.db --clobber

      - name: Publish archive site
        uses: ./.github/actions/publish-archive
        with:
          github-token: ${{ github.token }}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-logs-${{ github.run_number }}
          path: logs/
          retention-days: 90
