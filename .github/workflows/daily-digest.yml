name: Daily Digest

on:
  schedule:
    # 10:00am PT = 5:00pm UTC, 12:45pm PT = 7:45pm UTC
    # 4:15pm PT = 11:15pm UTC, 8:15pm PT = 3:15am UTC
    - cron: "0 17 * * *"
    - cron: "45 19 * * *"
    - cron: "15 23 * * *"
    - cron: "15 3 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

concurrency:
  group: db-access
  cancel-in-progress: false

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download database
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p data
          gh release download db-storage --pattern applied.db --dir data/ --clobber

      - name: Send daily digest
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python -m src.digest

      - name: Upload database
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload db-storage data/applied.db --clobber
