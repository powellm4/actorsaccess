name: Daily Digest

on:
  schedule:
    # 10:00am PT = 5:00pm UTC, 12:45pm PT = 7:45pm UTC
    # 4:15pm PT = 11:15pm UTC, 8:15pm PT = 3:15am UTC
    - cron: "0 17 * * *"
    - cron: "45 19 * * *"
    - cron: "15 23 * * *"
    - cron: "15 3 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send daily digest
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python -m src.digest

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/applied.db
          git diff --cached --quiet && echo "No DB changes" || (git commit -m "Update applied.db [skip ci]" && git pull --rebase && git push)
