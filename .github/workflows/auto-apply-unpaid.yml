name: Auto Apply (Unpaid)

on:
  schedule:
    # 9am PT (UTC-7) once daily
    - cron: "0 16 * * *"
  workflow_dispatch:
    inputs:
      max_submissions:
        description: "Override max submissions per platform (leave blank to use config default)"
        required: false
        default: ""
      max_pages:
        description: "Override max pages per platform (leave blank to use config default of 5)"
        required: false
        default: ""

permissions:
  contents: write

# Share the concurrency group with the paid workflow so they never both
# touch applied.db at the same time.
concurrency:
  group: db-access
  cancel-in-progress: false

env:
  # DeepSeek shadow comparison paused — kill switch from src/shadow.py.
  # Remove this block to resume background DeepSeek calls.
  SHADOW_ENABLED: "0"

jobs:
  auto-apply-unpaid:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Download database
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p data
          gh release download db-storage --pattern applied.db --dir data/ --clobber

      - name: Run AA auto-apply (unpaid)
        env:
          AA_USERNAME: ${{ secrets.AA_USERNAME }}
          AA_PASSWORD: ${{ secrets.AA_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GOOGLE_CALENDAR_SA_KEY: ${{ secrets.GOOGLE_CALENDAR_SA_KEY }}
          OVERRIDE_GITHUB_TOKEN: ${{ secrets.OVERRIDE_GITHUB_TOKEN }}
        run: |
          python -m src.main --once --mode unpaid \
            ${{ inputs.max_submissions && format('--max-submissions {0}', inputs.max_submissions) || '' }} \
            ${{ inputs.max_pages && format('--max-pages {0}', inputs.max_pages) || '' }}

      - name: Upload database (after AA)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload db-storage data/applied.db --clobber

      - name: Run CN auto-apply (unpaid, headed via xvfb)
        env:
          CN_EMAIL: ${{ secrets.CN_EMAIL }}
          CN_PASSWORD: ${{ secrets.CN_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GOOGLE_CALENDAR_SA_KEY: ${{ secrets.GOOGLE_CALENDAR_SA_KEY }}
          OVERRIDE_GITHUB_TOKEN: ${{ secrets.OVERRIDE_GITHUB_TOKEN }}
        run: |
          xvfb-run --auto-servernum python -m src.cn.main --once --mode unpaid \
            ${{ inputs.max_submissions && format('--max-submissions {0}', inputs.max_submissions) || '' }} \
            ${{ inputs.max_pages && format('--max-pages {0}', inputs.max_pages) || '' }}

      - name: Upload database (after CN)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload db-storage data/applied.db --clobber

      - name: Run Backstage auto-apply (unpaid)
        env:
          BACKSTAGE_EMAIL: ${{ secrets.BACKSTAGE_EMAIL }}
          BACKSTAGE_PASSWORD: ${{ secrets.BACKSTAGE_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GOOGLE_CALENDAR_SA_KEY: ${{ secrets.GOOGLE_CALENDAR_SA_KEY }}
          OVERRIDE_GITHUB_TOKEN: ${{ secrets.OVERRIDE_GITHUB_TOKEN }}
        run: |
          python -m src.backstage.main --once --mode unpaid \
            ${{ inputs.max_submissions && format('--max-submissions {0}', inputs.max_submissions) || '' }} \
            ${{ inputs.max_pages && format('--max-pages {0}', inputs.max_pages) || '' }}

      - name: Upload database (after Backstage)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload db-storage data/applied.db --clobber

      - name: Send digest email (unpaid)
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_SENDER_EMAIL: ${{ secrets.DIGEST_SENDER_EMAIL }}
          ARCHIVE_SITE_URL: ${{ vars.ARCHIVE_SITE_URL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python -m src.digest --mode unpaid

      - name: Upload database (after digest)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload db-storage data/applied.db --clobber

      - name: Publish archive site
        uses: ./.github/actions/publish-archive
        with:
          github-token: ${{ github.token }}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-logs-unpaid-${{ github.run_number }}
          path: logs/
          retention-days: 90
