name: Publish archive to GitHub Pages
description: >
  Renders the submissions archive HTML from the SQLite DB and pushes it to
  the gh-pages branch. The user opens the GitHub Pages URL and gets a live
  searchable view of every submission. Public — no auth.

inputs:
  github-token:
    description: GitHub token with contents:write for pushing to gh-pages.
    required: true
  db-path:
    description: Path to the SQLite database to render from.
    required: false
    default: data/applied.db

runs:
  using: composite
  steps:
    - name: Render archive HTML
      shell: bash
      run: |
        mkdir -p site-build
        python -m src.archive --db "${{ inputs.db-path }}" --output site-build/index.html

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ inputs.github-token }}
        publish_dir: ./site-build
        publish_branch: gh-pages
        force_orphan: true
        commit_message: "Update archive ${{ github.run_number }}"
