credentials:
  username: "REDACTED"
  password: "REDACTED"

filters:
  region: "Los Angeles"
  gender: "male"
  age_range: [19, 29]
  union_status: "nonunion_fit"
  paying_only: true
  exclude_reality_tv: true

submission:
  headshot_index: 0
  include_media: true
  include_size_card: true
  default_note: ""

max_pages: 5

browser:
  headless: true

google_calendar:
  service_account_key_env: "GOOGLE_CALENDAR_SA_KEY"
  calendars:
    - "Acting"
    - "Travel"

logging:
  level: "INFO"
  file: "logs/auto_apply.log"
