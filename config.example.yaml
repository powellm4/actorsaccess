credentials:
  username: "your_username"
  password: "your_password"

filters:
  region: "Los Angeles"
  gender: "male"
  age_range: [25, 35]
  union_status: "any"
  paying_only: true
  exclude_reality_tv: true

submission:
  headshot_index: 0
  include_media: true
  include_size_card: true
  default_note: ""

schedule:
  interval_hours: 4

browser:
  headless: true

logging:
  level: "INFO"
  file: "logs/auto_apply.log"

# Optional: Apply Anyway overrides. See README → "Apply Anyway via GitHub
# Issues". Requires OVERRIDE_GITHUB_TOKEN env var. Add the SAME block to every
# platform config (config*.yaml, cn_config*.yaml, backstage_config*.yaml) —
# each platform only processes its own queued overrides, so a config missing
# this block leaves that platform's "apply anyway" issues queued but never
# applied or closed.
# overrides:
#   repo: "your-username/aa-overrides"
#   label: "apply-anyway"
