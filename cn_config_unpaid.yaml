# CN narrows the billboard by clicking a named saved search after login.
# The user's "unpaid" saved search must exist on castingnetworks.com.
# If it can't be applied, src/cn/main.py fails closed in unpaid mode
# so we never scrape the default (paid) billboard under the unpaid flag.
# Programmatic role_matches() + is_lead_or_supporting() still run as a
# backstop in case the saved search allows anything through.
saved_search: "unpaid"

max_pages: 5

